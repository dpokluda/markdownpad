<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkdownPad — Live Markdown Playground</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "codemirror": "https://esm.sh/codemirror@6.0.1",
            "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6.3.2",
            "@codemirror/language": "https://esm.sh/@codemirror/language@6.11.0",
            "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.2",
            "@codemirror/view": "https://esm.sh/@codemirror/view@6.36.5",
            "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2"
        }
    }
    </script>
</head>
<body>
    <header>
        <h1>🦀 MarkdownPad</h1>
        <span class="subtitle">Markdown → HTML, powered by Rust + WebAssembly</span>
    </header>
    <main>
        <div class="pane editor-pane">
            <div class="pane-header">Markdown</div>
            <div id="editor"></div>
        </div>
        <div class="pane preview-pane">
            <div class="pane-header">Preview</div>
            <div id="preview"></div>
        </div>
    </main>
    <footer>
        <span>Built by <a href="https://github.com/dpokluda" target="_blank">David Pokluda</a></span>
        <a href="https://github.com/dpokluda/markdownpad" target="_blank">View on GitHub</a>
    </footer>
    <script type="module" src="app.js"></script>
</body>
</html>
